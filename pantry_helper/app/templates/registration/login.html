{% extends "base.html" %}

{% block title %}Login | Pantry Helper{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="card auth-panel">
        <span class="eyebrow">Account</span>
        <h1>Login</h1>
        <p class="page-subtitle">Access your household pantry, recipes, and waste tracking.</p>

        <form method="post" class="form-card">
            {% csrf_token %}
            {{ form.as_p }}

            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <div class="page-actions">
                <button type="submit" class="btn">Entrar</button>
                <a href="{% url 'app:home' %}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
