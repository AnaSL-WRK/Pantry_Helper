{% extends "base.html" %}

{% block content %}
  <h1>Add household member</h1>

  {% if membership %}
    <p><strong>Household:</strong> {{ membership.household.name }}</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create member</button>
  </form>

  <p><a href="{% url 'app:household_members' %}">Back to members</a></p>
{% endblock %}
