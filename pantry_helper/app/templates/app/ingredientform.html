{% extends "base.html" %}

{% block title %}{{ page_title }} | Pantry Helper{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <span class="eyebrow">Ingredient</span>
        <h1>{{ page_title }}</h1>
        <p class="page-subtitle">Create a new ingredient so it can be used in pantry items and recipes.</p>
    </div>
</div>

<form method="post" class="card form-card">
    {% csrf_token %}
    {{ form.as_p }}

    {% if next_url %}
        <input type="hidden" name="next" value="{{ next_url }}">
    {% endif %}

    <div class="page-actions">
        <button type="submit" class="btn">Save ingredient</button>
        <a href="{{ next_url|default:'#' }}" class="btn btn-secondary">Back</a>
    </div>
</form>
{% endblock %}
