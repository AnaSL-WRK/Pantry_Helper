{% extends "base.html" %}

{% block content %}
  <h1>{{ page_title }}</h1>

  <p>
    Can’t find the food in the list?
    <a href="{{ add_ingredient_url }}">Create a new food</a>
  </p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{{ submit_label }}</button>
  </form>
{% endblock %}
