{% extends "base.html" %}

{% block content %}
  <h1>{{ page_title }}</h1>

  {% if add_ingredient_url %}
    <p>
      Can't find the food in the list?
      <a href="{{ add_ingredient_url }}">Create a new ingredient</a>
    </p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{{ submit_label }}</button>
  </form>

  <p><a href="{% url 'app:food_list' %}">Back to pantry</a></p>
{% endblock %}
