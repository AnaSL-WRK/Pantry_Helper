{% extends "base.html" %}

{% block title %}Delete food | Pantry Helper{% endblock %}

{% block content %}
<section class="card warning-card">
    <span class="eyebrow">Danger zone</span>
    <h1>Delete food</h1>
    <p>Are you sure you want to delete <strong>{{ food.ingredient.name }}</strong>?</p>
    <p class="page-subtitle">Current quantity: {{ food.quantity }} {{ food.unit }}</p>

    <form method="post" class="page-actions">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'app:food_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</section>
{% endblock %}
