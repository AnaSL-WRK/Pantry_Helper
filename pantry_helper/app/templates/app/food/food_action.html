{% extends "base.html" %}

{% block content %}
  <h1>{{ page_title }}</h1>

  <p>
    <strong>{{ food.ingredient.name }}</strong><br>
    Current quantity: {{ food.quantity }} {{ food.unit }}
  </p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{{ submit_label }}</button>
  </form>

  <p><a href="{% url 'app:food_list' %}">Back to pantry</a></p>
{% endblock %}
